name: Weekly Login Analytics

on:
  schedule:
    - cron: '30 18 * * 6'
  workflow_dispatch:

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary requests   

      - name: Run analytics pipeline
        run: python analytics_pipeline.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}  
