name: Weekly Login Analytics

on:
  schedule:
    - cron: '30 18 * * 6'
  workflow_dispatch:

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary requests python-dotenv

      - name: Verify DATABASE_URL is set
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL secret is not set!"
            exit 1
          fi
          echo "�� DATABASE_URL is configured"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run analytics pipeline
        run: python analytics_pipeline.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
